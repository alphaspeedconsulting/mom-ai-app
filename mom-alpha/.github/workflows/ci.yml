name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mom-alpha/package-lock.json

      - name: Install dependencies
        working-directory: mom-alpha
        run: npm ci

      - name: Lint
        working-directory: mom-alpha
        run: npm run lint

      - name: Type check
        working-directory: mom-alpha
        run: npx tsc --noEmit

      - name: Build
        working-directory: mom-alpha
        run: npm run build

  # Backend lives in the private Cowork repo and deploys from there.
  # Backend CI (pytest) runs in that repo's own pipeline.
  # See: docs/enhancement-plans/2026-03-25-backend-frontend-integration.md
