# Publishes the Next.js static export (mom-alpha/out) to GitHub Pages.
# Repo: mom-ai-app — not the Alpha AI Website repo.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mom-alpha/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mom-alpha

      - name: Build static export
        run: npm run build
        working-directory: mom-alpha

      - name: Disable Jekyll (allow _next and dotfiles)
        run: touch out/.nojekyll
        working-directory: mom-alpha

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mom-alpha/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
